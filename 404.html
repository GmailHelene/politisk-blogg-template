<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siden finnes ikke</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .feilside { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 1.5rem; }
    .feilside .kode { font-family: var(--display); font-size: clamp(4rem, 14vw, 7rem); line-height: 1; color: var(--accent); }
    .feilside h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); margin: .6rem 0 1rem; }
    .feilside p { color: var(--ink-soft); max-width: 440px; margin: 0 auto 1.8rem; }
  </style>
</head>
<body>
  <main class="feilside">
    <p class="kode">404</p>
    <h1>Denne siden finnes ikke</h1>
    <p>Kanskje den er flyttet, eller så har lenken en skrivefeil. Gå tilbake til forsiden, så finner du veien videre.</p>
    <a href="/" class="btn">Til forsiden</a>
  </main>

  <footer class="footer">
    <p class="footer__brand">&nbsp;</p>
    <p class="footer__credit">Nettside av <a href="https://helene.cloud" target="_blank" rel="noopener">helene.cloud</a></p>
  </footer>
</body>
</html>
